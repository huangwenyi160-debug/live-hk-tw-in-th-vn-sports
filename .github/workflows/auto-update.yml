name: Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python update_m3u.py
      - uses: EndBug/add-and-commit@v10
        with:
          message: "Auto Update"
          add: "live.m3u"
